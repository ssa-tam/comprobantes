<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Administrador — SST</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f0ea; min-height: 100vh; padding: 1rem; }
    .card { background: #fff; border-radius: 14px; box-shadow: 0 4px 24px rgba(155,27,55,0.12); padding: 2rem; width: 100%; max-width: 500px; margin: 2rem auto; border-top: 5px solid #9B1B37; }
    .card-wide { max-width: 820px; }
    .logo-wrap { text-align: center; margin-bottom: 1.5rem; }
    .logo-icon { width: 60px; height: 60px; margin: 0 auto 0.75rem; }
    .logo-icon img { width: 100%; height: 100%; object-fit: contain; }
    .logo-wrap h1 { font-size: 16px; font-weight: 700; color: #9B1B37; }
    .logo-wrap p { font-size: 12px; color: #C9A668; font-weight: 600; letter-spacing: 0.03em; margin-top: 3px; }
    .badge-admin { display: inline-block; background: #9B1B37; color: #fff; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-top: 6px; letter-spacing: 0.05em; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 12px; color: #7A6C5D; margin-bottom: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
    .field input { width: 100%; padding: 10px 12px; font-size: 14px; font-family: Arial; border: 1.5px solid #E3D9CC; border-radius: 8px; background: #FBF8F4; color: #3A2E25; outline: none; }
    .field input:focus { border-color: #9B1B37; box-shadow: 0 0 0 3px rgba(155,27,55,0.1); }
    .btn { width: 100%; padding: 11px; font-size: 14px; font-weight: 700; font-family: Arial; background: linear-gradient(135deg, #9B1B37, #C8313D); color: #fff; border: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 0.5rem; box-shadow: 0 2px 8px rgba(155,27,55,0.25); transition: filter .2s; }
    .btn:hover { filter: brightness(1.08); }
    .btn:disabled { background: #E3D9CC; color: #B4A691; box-shadow: none; cursor: not-allowed; filter: none; }
    .btn-sm { width: auto; padding: 7px 16px; font-size: 13px; margin-top: 0; }
    .btn-green { background: linear-gradient(135deg, #2E6E3F, #3A8A50); }
    .btn-gray  { background: linear-gradient(135deg, #7A6C5D, #9A8C7D); }
    .msg { font-size: 13px; border-radius: 8px; padding: 10px 14px; margin-top: 1rem; }
    .msg.error   { background: #FCEAEA; color: #9B1B37; }
    .msg.success { background: #EAF5EC; color: #2E6E3F; }
    .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 10px; }
    .panel-header h2 { font-size: 15px; font-weight: 700; color: #9B1B37; }
    .global-btns { display: flex; gap: 8px; }
    .search-box { width: 100%; padding: 8px 12px; font-size: 13px; border: 1.5px solid #E3D9CC; border-radius: 8px; background: #FBF8F4; outline: none; font-family: Arial; margin-bottom: 1rem; }
    .search-box:focus { border-color: #9B1B37; }
    .unit-list { max-height: 500px; overflow-y: auto; }
    .unit-list::-webkit-scrollbar { width: 6px; }
    .unit-list::-webkit-scrollbar-thumb { background: #E3D9CC; border-radius: 3px; }
    .unit-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-bottom: 1px solid #F0E6D8; gap: 10px; }
    .unit-row:last-child { border-bottom: none; }
    .unit-row:hover { background: #FBF8F4; border-radius: 8px; }
    .unit-info { flex: 1; }
    .unit-name { font-size: 13px; font-weight: 600; color: #3A2E25; }
    .unit-user { font-size: 11px; color: #B4A691; margin-top: 2px; }
    .toggle { position: relative; width: 48px; height: 26px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #E3D9CC; border-radius: 26px; transition: .3s; }
    .toggle-slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .3s; }
    .toggle input:checked + .toggle-slider { background: #9B1B37; }
    .toggle input:checked + .toggle-slider:before { transform: translateX(22px); }
    .status-tag { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; flex-shrink: 0; min-width: 75px; text-align: center; }
    .status-on  { background: #EAF5EC; color: #2E6E3F; }
    .status-off { background: #FCEAEA; color: #9B1B37; }
    .counter { font-size: 12px; color: #B4A691; text-align: right; margin-top: 8px; }
    .trim-cols { display: flex; gap: 6px; flex-shrink: 0; }
    .trim-badge { font-size: 10px; font-weight: 700; padding: 3px 7px; border-radius: 8px; text-align: center; min-width: 64px; }
    .trim-ok  { background: #EAF5EC; color: #2E6E3F; }
    .trim-pend { background: #F5F0EA; color: #B4A691; }
    .trim-label { font-size: 9px; font-weight: 600; color: #B4A691; text-align: center; margin-top: 2px; letter-spacing: .03em; }
    .screen { display: none; }
    .screen.active { display: block; }
    .footer { text-align: center; margin-top: 1.5rem; font-size: 11px; color: #B4A691; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

      <h1>Control de acceso — Unidades médicas</h1>
      <span class="badge-admin">ADMINISTRADOR</span>
    </div>

    <div class="panel-header">
      <h2 id="panel-titulo">Cargando…</h2>
      <div class="global-btns">
        <button class="btn btn-sm btn-green" onclick="setTodas('Activo')">✓ Habilitar todas</button>
        <button class="btn btn-sm btn-gray"  onclick="setTodas('Inactivo')">✕ Deshabilitar todas</button>
      </div>
    </div>

    <input class="search-box" type="text" id="search" placeholder="Buscar unidad…" oninput="filtrar()" />
    <div class="unit-list" id="unit-list"></div>
    <div class="counter" id="counter"></div>

    <div class="msg success" id="msg-ok" style="display:none;margin-top:1rem"></div>
    <div class="footer">Secretaría de Salud de Tamaulipas · 2026</div>
  </div>
</div>

<script>
const URL_AS = "https://script.google.com/macros/s/AKfycbyabK3b95t6BAP1LRmcv_igXDMg5IurI8AuDXvm-zASuB6zIt_CsRwAsNp_jnJ4A77j/exec";
let ADM_USR = "", ADM_PWD = "";
let ESTATUS = [];
let UNIDADES = [];

function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function apiFetch(params) {
  const qs = Object.entries(params).map(([k,v]) => k+'='+encodeURIComponent(v)).join('&');
  const base = URL_AS + '?' + qs + '&t=' + Date.now();

  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*9999);
    const script = document.createElement('script');
    let done = false;

    window[cbName] = function(data) {
      done = true;
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      resolve(data);
    };

    script.onerror = function() {
      if (done) return;
      done = true;
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      reject(new Error('JSONP failed'));
    };

    script.src = base + '&callback=' + cbName;
    document.head.appendChild(script);

    setTimeout(() => {
      if (done) return;
      done = true;
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      reject(new Error('Timeout'));
    }, 15000);
  });
}

async function doLogin() {
  ADM_USR = document.getElementById('adm-usr').value.trim();
  ADM_PWD = document.getElementById('adm-pwd').value;
  document.getElementById('msg-err').style.display = 'none';
  document.getElementById('btn-login').disabled = true;
  document.getElementById('btn-txt').textContent = 'Verificando…';
  try {
    const data = await apiFetch({ usuario: ADM_USR, password: ADM_PWD, action: 'get_unidades' });
    if (data.ok) {
      UNIDADES = data.unidades;
      // Cargar estatus de trimestres
      const dataE = await apiFetch({ usuario: ADM_USR, password: ADM_PWD, action: 'get_all_estatus' });
      ESTATUS = dataE.ok ? dataE.estatus : [];
      renderUnidades(UNIDADES);
      document.getElementById('panel-titulo').textContent = UNIDADES.length + ' Unidades médicas';
      goTo('s-panel');
    } else {
      document.getElementById('msg-err').style.display = 'block';
    }
  } catch(e) {
    document.getElementById('msg-err').textContent = 'Error de conexión.';
    document.getElementById('msg-err').style.display = 'block';
  } finally {
    document.getElementById('btn-login').disabled = false;
    document.getElementById('btn-txt').textContent = 'Ingresar al panel';
  }
}

function renderUnidades(lista) {
  const container = document.getElementById('unit-list');
  container.innerHTML = '';
  lista.forEach(u => {
    const isOn = u.estado.toLowerCase() === 'activo';
    const row = document.createElement('div');
    row.className = 'unit-row';
    const e1 = ESTATUS.find(e => e.usuario === u.usuario && e.trimestre === '1° Trimestre');
    const e2 = ESTATUS.find(e => e.usuario === u.usuario && e.trimestre === '2° Trimestre');
    const ok1 = e1 && e1.estatus === 'Completado';
    const ok2 = e2 && e2.estatus === 'Completado';
    row.innerHTML = `
      <div class="unit-info">
        <div class="unit-name">${u.nombre}</div>
        <div class="unit-user">${u.usuario}</div>
      </div>
      <div class="trim-cols">
        <div>
          <div class="trim-badge ${ok1 ? 'trim-ok' : 'trim-pend'}">${ok1 ? '✅ Listo' : '⏳ Pendiente'}</div>
          <div class="trim-label">1° TRIM</div>
        </div>
        <div>
          <div class="trim-badge ${ok2 ? 'trim-ok' : 'trim-pend'}">${ok2 ? '✅ Listo' : '⏳ Pendiente'}</div>
          <div class="trim-label">2° TRIM</div>
        </div>
      </div>
      <span class="status-tag ${isOn ? 'status-on' : 'status-off'}" id="tag-${u.usuario}">${isOn ? '✓ Activo' : '✕ Inactivo'}</span>
      <label class="toggle">
        <input type="checkbox" ${isOn ? 'checked' : ''} onchange="toggleUnidad('${u.usuario}', this.checked)" />
        <span class="toggle-slider"></span>
      </label>
    `;
    container.appendChild(row);
  });
  actualizarContador();
}

async function toggleUnidad(usuario, activo) {
  const nuevoEstado = activo ? 'Activo' : 'Inactivo';
  const tag = document.getElementById('tag-' + usuario);
  tag.textContent = '…'; tag.className = 'status-tag';
  try {
    const data = await apiFetch({ usuario: ADM_USR, password: ADM_PWD, action: 'set_estado', target: usuario, estado: nuevoEstado });
    if (data.ok) {
      tag.textContent = activo ? '✓ Activo' : '✕ Inactivo';
      tag.className = 'status-tag ' + (activo ? 'status-on' : 'status-off');
      const u = UNIDADES.find(x => x.usuario === usuario);
      if (u) u.estado = nuevoEstado;
      mostrarOk((activo ? 'Habilitado: ' : 'Deshabilitado: ') + usuario);
      actualizarContador();
    }
  } catch(e) { tag.textContent = 'Error'; }
}

async function setTodas(estado) {
  try {
    const data = await apiFetch({ usuario: ADM_USR, password: ADM_PWD, action: 'set_todas', estado });
    if (data.ok) {
      UNIDADES.forEach(u => u.estado = estado);
      renderUnidades(filtrarLista());
      mostrarOk(estado === 'Activo' ? 'Todas las unidades habilitadas ✓' : 'Todas las unidades deshabilitadas');
    }
  } catch(e) { alert('Error de conexión'); }
}

function filtrarLista() {
  const q = document.getElementById('search').value.toLowerCase();
  return q ? UNIDADES.filter(u => u.nombre.toLowerCase().includes(q) || u.usuario.toLowerCase().includes(q)) : UNIDADES;
}

function filtrar() { renderUnidades(filtrarLista()); }

function actualizarContador() {
  const activas = UNIDADES.filter(u => u.estado.toLowerCase() === 'activo').length;
  document.getElementById('counter').textContent = activas + ' de ' + UNIDADES.length + ' unidades habilitadas';
}

function mostrarOk(msg) {
  const el = document.getElementById('msg-ok');
  el.textContent = '✓ ' + msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('s-login').classList.contains('active')) doLogin();
  }
});
</script>
</body>
